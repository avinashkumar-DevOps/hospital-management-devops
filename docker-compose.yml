version: '3'

services:

  app:
    build: .
    container_name: hospital_app
    ports:
      - "5000:5000"

    depends_on:
      - mysql

  mysql:

    image: mysql:8
    container_name: hospital_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital

    ports:
      - "3306:3306"